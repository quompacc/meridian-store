<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root runs and owns the daemon. -->
  <policy user="root">
    <allow own="org.meridian.Store"/>
  </policy>

  <!-- Any user may call the interface; polkit decides who may actually act. -->
  <policy context="default">
    <allow send_destination="org.meridian.Store" send_interface="org.meridian.Store1"/>
    <allow send_destination="org.meridian.Store" send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="org.meridian.Store" send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="org.meridian.Store" send_interface="org.freedesktop.DBus.Peer"/>
  </policy>
</busconfig>
